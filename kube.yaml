apiVersion: v1
kind: Pod
metadata:
  name: datamonster
spec:
  containers:
    - name: keycloak
      image: keycloak
      args: ["start-dev", "--import-realm"]
      ports:
        - containerPort: 8180
          hostPort: 8180
      env:
        - name: KC_HTTP_PORT
          value: "8180"
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          value: "admin"
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          value: "admin"

    - name: valkey
      image: valkey/valkey:8-alpine
      ports:
        - containerPort: 6379
          hostPort: 6379

    - name: db
      image: db
      ports:
        - containerPort: 5432
          hostPort: 5432
      env:
        - name: POSTGRES_DB
          value: records
        - name: POSTGRES_USER
          value: app
        - name: POSTGRES_PASSWORD
          value: Password1

    - name: api
      image: api
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: VALKEY_ADDR
          value: "127.0.0.1:6379"
        - name: CONN_STRING
          value: "postgres://app:Password1@127.0.0.1:5432/records?sslmode=disable"
        - name: KEYCLOAK_URL
          value: "http://127.0.0.1:8180"
        - name: KEYCLOAK_REALM
          value: "data-monster"
        - name: KEYCLOAK_CLIENT_ID
          value: "datamonster-local"
        - name: KEYCLOAK_CLIENT_SECRET
          value: "dev-local-secret"
        - name: KEYCLOAK_REDIRECT_URL
          value: "http://localhost:8000/auth/callback"

    - name: web
      image: web
      ports:
        - containerPort: 8000
          hostPort: 8000
